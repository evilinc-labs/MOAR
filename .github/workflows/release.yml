name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  build:
    name: Build ${{ matrix.lane }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: legacy
            java: '21'
            args: ''
            tasks: ':1.21.4:buildAndCollect :1.21.5:buildAndCollect :1.21.8:buildAndCollect :1.21.10:buildAndCollect :1.21.11:buildAndCollect'
          - lane: modern
            java: '25'
            args: '-Pmoar.includeJava25Targets=true'
            tasks: ':26.1.1:buildAndCollect :26.2:buildAndCollect'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v4
      - name: Build versions
        run: ./gradlew ${{ matrix.args }} ${{ matrix.tasks }} --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.lane }}
          path: build/libs/**/*.jar
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download compiled JARs
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: build/collected
          merge-multiple: true

      - name: Resolve version
        id: version
        run: |
          if [[ "$GITHUB_REF_NAME" == v* ]]; then
            VER="${GITHUB_REF_NAME#v}"
          else
            VER=$(grep '^mod\.version=' gradle.properties | cut -d= -f2)
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Normalize and package artifacts
        id: package
        run: |
          VER=${{ steps.version.outputs.version }}
          JAR_DIR="build/libs/${VER}"
          STAGING=build/release
          mkdir -p "$JAR_DIR" "$STAGING"
          find build/collected -name '*.jar' -exec cp {} "$JAR_DIR/" \;
          HASH_BODY=''
          for mc in 1.21.4 1.21.5 1.21.8 1.21.10 1.21.11 26.1.1 26.2; do
            JAR="$JAR_DIR/moar-${VER}+${mc}.jar"
            if [ ! -f "$JAR" ]; then
              echo "::error::Missing JAR: $JAR"
              exit 1
            fi
            JAR_NAME=$(basename "$JAR")
            ZIP_NAME="moar-${VER}+${mc}.zip"
            HASH=$(sha256sum "$JAR" | awk '{print $1}')
            echo "${HASH}  ${JAR_NAME}" > "$STAGING/SHA256SUMS.txt"
            zip -j "$STAGING/$ZIP_NAME" "$JAR" "$STAGING/SHA256SUMS.txt"
            rm "$STAGING/SHA256SUMS.txt"
            HASH_BODY="${HASH_BODY}| ${mc} | \`${JAR_NAME}\` | \`${HASH}\` |"$'\n'
          done
          SOURCES=$(find "$JAR_DIR" -name 'moar-*-sources.jar' -print -quit)
          [ -n "$SOURCES" ] && cp "$SOURCES" "$STAGING/"
          printf 'hashes<<EOF\n%sEOF\n' "$HASH_BODY" >> "$GITHUB_OUTPUT"
          echo "jar_dir=$JAR_DIR" >> "$GITHUB_OUTPUT"
          echo "staging=$STAGING" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$GITHUB_REF_NAME" ]; then
            CHANGES=$(git log --pretty=format:'- %s' "$PREV_TAG".."$GITHUB_REF_NAME" -- ':!*.md' ':!.github' || true)
          else
            CHANGES='- Initial release'
          fi
          printf 'changes<<EOF\n%s\nEOF\n' "$CHANGES" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ${{ steps.package.outputs.jar_dir }}
          format: spdx-json
          output-file: build/release/moar-${{ steps.version.outputs.version }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate checksums
        run: |
          for jar in ${{ steps.package.outputs.jar_dir }}/*.jar; do
            sha256sum "$jar" > "build/release/$(basename "$jar").sha256"
          done

      - name: Attest provenance
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.package.outputs.jar_dir }}/*.jar

      - name: Attest SBOM
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.package.outputs.jar_dir }}/*.jar
          sbom-path: build/release/moar-${{ steps.version.outputs.version }}.spdx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MOAR v${{ steps.version.outputs.version }}
          body: |
            ## MOAR v${{ steps.version.outputs.version }}

            Each ZIP contains the mod JAR and its SHA-256 verification file.

            | Minecraft | File | SHA-256 |
            |-----------|------|---------|
            ${{ steps.package.outputs.hashes }}

            ### Changes
            ${{ steps.changelog.outputs.changes }}
          files: |
            build/release/moar-*.zip
            build/release/moar-*-sources.jar
            build/release/*.sha256
            build/release/*.spdx.json
          fail_on_unmatched_files: true
          generate_release_notes: false
