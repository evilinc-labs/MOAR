name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      # 26.1.1 excluded — requires JDK 25 (not yet available on GitHub-hosted runners)
      - name: Clean & build stable versions
        run: >
          ./gradlew clean
          :1.21.1:buildAndCollect
          :1.21.4:buildAndCollect
          :1.21.5:buildAndCollect
          :1.21.8:buildAndCollect
          :1.21.10:buildAndCollect
          :1.21.11:buildAndCollect
          --no-daemon

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package release ZIPs
        id: package
        run: |
          VER="${{ steps.version.outputs.version }}"
          STAGING="build/release"
          mkdir -p "$STAGING"

          HASH_BODY=""

          for mc in 1.21.1 1.21.4 1.21.5 1.21.8 1.21.10 1.21.11; do
            JAR="build/libs/${VER}/moar-${VER}+${mc}.jar"
            if [ ! -f "$JAR" ]; then
              echo "::error::Missing JAR: $JAR"
              exit 1
            fi

            HASH=$(sha256sum "$JAR" | awk '{print $1}')
            JAR_NAME="moar-${VER}+${mc}.jar"
            ZIP_NAME="moar-${VER}+${mc}.zip"

            # Create checksum file for inside the ZIP
            echo "${HASH}  ${JAR_NAME}" > "${STAGING}/SHA256SUMS.txt"

            # Build the ZIP (jar + checksum)
            (cd "build/libs/${VER}" && zip -j "../../release/${ZIP_NAME}" "$JAR_NAME")
            (cd "$STAGING" && zip "${ZIP_NAME}" SHA256SUMS.txt)
            rm "${STAGING}/SHA256SUMS.txt"

            HASH_BODY="${HASH_BODY}| ${mc} | \`${JAR_NAME}\` | \`${HASH}\` |"$'\n'
          done

          # Sources JAR (not zipped, included directly)
          SOURCES_JAR=$(find "build/libs/${VER}" -name "moar-*-sources.jar" | head -1)
          if [ -n "$SOURCES_JAR" ]; then
            cp "$SOURCES_JAR" "$STAGING/"
          fi

          # Write hash table for release body
          {
            echo "hashes<<EOF"
            echo "$HASH_BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "staging=$STAGING" >> "$GITHUB_OUTPUT"
          ls -la "$STAGING/"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$GITHUB_REF_NAME" ]; then
            CHANGES=$(git log --pretty=format:"- %s" "$PREV_TAG".."$GITHUB_REF_NAME" -- \
              ':!*.md' ':!.github' 2>/dev/null || echo "- Initial release")
          else
            CHANGES="- Initial release"
          fi
          {
            echo "changes<<EOF"
            echo "$CHANGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MOAR v${{ steps.version.outputs.version }}
          body: |
            ## MOAR v${{ steps.version.outputs.version }}

            ### Downloads
            Each ZIP contains the mod JAR and a `SHA256SUMS.txt` verification file.

            | Minecraft | File | SHA-256 |
            |-----------|------|---------|
            ${{ steps.package.outputs.hashes }}

            ### Changes
            ${{ steps.changelog.outputs.changes }}
          files: |
            ${{ steps.package.outputs.staging }}/moar-*.zip
            ${{ steps.package.outputs.staging }}/moar-*-sources.jar
          fail_on_unmatched_files: true
          generate_release_notes: false
