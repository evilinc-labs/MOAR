name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore: ['**.md', 'LICENSE']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.lane }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: legacy
            java: '21'
            args: ''
            tasks: ':1.21.4:buildAndCollect :1.21.5:buildAndCollect :1.21.8:buildAndCollect :1.21.10:buildAndCollect :1.21.11:buildAndCollect'
          - lane: modern
            java: '25'
            args: '-Pmoar.includeJava25Targets=true'
            tasks: ':26.1.1:buildAndCollect :26.2:buildAndCollect'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Build versions
        run: ./gradlew ${{ matrix.args }} ${{ matrix.tasks }} --no-daemon

      - name: Upload collected JARs
        uses: actions/upload-artifact@v4
        with:
          name: compiled-${{ matrix.lane }}
          path: build/libs/**/*.jar
          if-no-files-found: error
          retention-days: 14

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.lane }}
          path: versions/*/build/reports/tests/
          if-no-files-found: ignore

  package:
    name: Package artifacts
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download compiled JARs
        uses: actions/download-artifact@v4
        with:
          pattern: compiled-*
          path: build/collected
          merge-multiple: true

      - name: Package version ZIPs
        run: |
          VER=$(grep '^mod\.version=' gradle.properties | cut -d= -f2)
          STAGING=build/release
          mkdir -p "$STAGING"
          for mc in 1.21.4 1.21.5 1.21.8 1.21.10 1.21.11 26.1.1 26.2; do
            JAR=$(find build/collected -name "moar-${VER}+${mc}.jar" -print -quit)
            if [ -z "$JAR" ]; then
              echo "::error::Missing JAR for Minecraft ${mc}"
              exit 1
            fi
            JAR_NAME=$(basename "$JAR")
            ZIP_NAME="moar-${VER}+${mc}.zip"
            sha256sum "$JAR" | sed "s#${JAR}#${JAR_NAME}#" > "$STAGING/SHA256SUMS.txt"
            zip -j "$STAGING/$ZIP_NAME" "$JAR" "$STAGING/SHA256SUMS.txt"
            rm "$STAGING/SHA256SUMS.txt"
          done
          SOURCES=$(find build/collected -name 'moar-*-sources.jar' -print -quit)
          [ -n "$SOURCES" ] && cp "$SOURCES" "$STAGING/"

      - name: Upload packaged builds
        uses: actions/upload-artifact@v4
        with:
          name: moar-all-versions
          path: build/release/
          if-no-files-found: error
          retention-days: 14

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v4
      - name: SpotBugs / checkstyle
        run: ./gradlew check -x test || true

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v4
      - name: OWASP Dependency-Check
        run: ./gradlew dependencyCheckAnalyze --info || true
      - name: Upload dependency report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: build/reports/dependency-check-report.html
          if-no-files-found: ignore
