name: PR Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  check:
    name: Check ${{ matrix.lane }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: legacy
            java: '21'
            args: ''
            versions: '1.21.4 1.21.5 1.21.8 1.21.10 1.21.11'
            tasks: ':1.21.4:buildAndCollect :1.21.5:buildAndCollect :1.21.8:buildAndCollect :1.21.10:buildAndCollect :1.21.11:buildAndCollect'
            expected: 5
          - lane: modern
            java: '25'
            args: '-Pmoar.includeJava25Targets=true'
            versions: '26.1.1 26.2'
            tasks: ':26.1.1:buildAndCollect :26.2:buildAndCollect'
            expected: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Build versions
        run: ./gradlew ${{ matrix.args }} ${{ matrix.tasks }} --no-daemon

      - name: Verify and summarize
        run: |
          VER=$(grep '^mod\.version=' gradle.properties | cut -d= -f2)
          actual=0
          echo "## ${{ matrix.lane }} build results" >> "$GITHUB_STEP_SUMMARY"
          for mc in ${{ matrix.versions }}; do
            jar="build/libs/${VER}/moar-${VER}+${mc}.jar"
            if [ -f "$jar" ]; then
              actual=$((actual + 1))
              echo "- :white_check_mark: Minecraft ${mc} ($(du -h "$jar" | cut -f1))" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- :x: Minecraft ${mc}" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          if [ "$actual" -ne "${{ matrix.expected }}" ]; then
            echo "::error::Expected ${{ matrix.expected }} JARs but found ${actual}"
            exit 1
          fi
